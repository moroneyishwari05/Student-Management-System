<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update Student Page</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
crossorigin="anonymous">
</head>
<body>
	<nav class="navbar navbar-expand-md bg-dark navbar-dark">

        <a class="navbar-brand" href="#">
            Student Management System
        </a>

    </nav>
	<div class="container">
	
		<div class="row">
		
			<div class="col-log-6 col-md-6 col-sm-6
			container justify-content-center card">
				<div class = "text-center" style="font-size: 30px;">Update Student</div>
				<div class="card-body"><</div>
				<form th:action="@{/students/edit/{id}(id=${student.id})}" th:object = "${student}" method="post">
					<div class="form-group">
						<label>Student First Name</label>
						<input type="text" name ="firstName" 
						class="form-control"
						placeholder="enter Student First Name">
					</div>
					
					<div class="form-group">
						<label>Student Last Name</label>
						<input type="text" name ="lastName" 
						class="form-control"
						placeholder="enter Student Last Name">
					</div>
					
					<div class="form-group">
						<label>Student First Name</label>
						<input type="text" name ="email" 
						class="form-control"
						placeholder="enter Student Email ">
					</div>
					
					 <div class = "btn-footer"> 
 			 			<button type="submit" class="btn btn-primary">Submit</button> 
 			 		</div>
				</form>
		 </div>
	</div>
</body>
</html>
